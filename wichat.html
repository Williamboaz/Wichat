<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WiChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e0f;
    --bg-alt:#12181a;
    --bg-card:#161e20;
    --text:#eef2f1;
    --text-dim:#8fa19d;
    --accent:#2dd4bf;
    --accent-dim:#1a4d47;
    --bubble-me:#134e4a;
    --bubble-them:#1f2a2c;
    --danger:#e2574c;
    --border:#22302f;
    --radius:16px;
    --font-display:'Sora',sans-serif;
    --font-body:'Inter',sans-serif;
  }
  body.light{
    --bg:#f4faf9;
    --bg-alt:#ffffff;
    --bg-card:#ffffff;
    --text:#0e1a19;
    --text-dim:#5c6f6c;
    --accent:#0d9488;
    --accent-dim:#c9f2ec;
    --bubble-me:#c9f2ec;
    --bubble-them:#eef1f0;
    --border:#dfe8e6;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    transition:background .3s,color .3s;
  }
  #phone{
    width:100%;
    max-width:420px;
    height:100vh;
    max-height:880px;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
    border-radius:0;
    box-shadow:0 0 60px rgba(0,0,0,.4);
  }
  @media(min-width:480px){
    #phone{ border-radius:36px; margin:20px 0; }
  }
  .screen{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
    background:var(--bg);
  }
  .screen.active{display:flex;}

  /* SPLASH */
  #screen-splash{
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 50% 30%, var(--accent-dim), var(--bg) 70%);
    gap:14px;
  }
  #screen-splash .logo{
    width:84px;height:84px;border-radius:22px;
    background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:800;font-size:34px;color:#03211d;
    animation:pop .5s ease;
  }
  @keyframes pop{ from{transform:scale(.5);opacity:0;} to{transform:scale(1);opacity:1;} }
  #screen-splash h1{font-family:var(--font-display);font-size:15px;letter-spacing:2px;color:var(--text-dim);margin:0;text-transform:uppercase;}
  #screen-splash .sub{font-size:22px;font-weight:700;color:var(--text);font-family:var(--font-display);}

  /* GENERIC HEADER */
  .topbar{
    display:flex;align-items:center;gap:12px;
    padding:18px 18px 14px;
    border-bottom:1px solid var(--border);
    background:var(--bg-alt);
  }
  .topbar h2{margin:0;font-family:var(--font-display);font-size:19px;font-weight:700;}
  .backbtn{
    width:34px;height:34px;border-radius:10px;border:none;background:var(--bg-card);
    color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .scroll{flex:1;overflow-y:auto;padding:18px;}

  /* FORM ELEMENTS */
  label{font-size:13px;color:var(--text-dim);font-weight:600;margin-bottom:6px;display:block;}
  .field{margin-bottom:16px;}
  input[type=text],input[type=email],input[type=password],input[type=date],textarea,select{
    width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);
    background:var(--bg-card);color:var(--text);font-size:15px;font-family:var(--font-body);outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  .pwd-wrap{position:relative;}
  .pwd-wrap input{padding-right:56px;}
  .pwd-toggle{
    position:absolute;right:6px;top:6px;bottom:6px;width:46px;
    background:transparent;border:none;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;
  }
  .btn{
    width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);
    color:#03211d;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--font-body);
    transition:transform .1s;
  }
  .btn:active{transform:scale(.98);}
  .btn.secondary{background:var(--bg-card);color:var(--text);border:1px solid var(--border);}
  .btn.ghost{background:transparent;color:var(--accent);}
  .hint{font-size:12px;color:var(--text-dim);margin-top:10px;text-align:center;}
  .errormsg{color:var(--danger);font-size:13px;min-height:16px;margin-top:-6px;margin-bottom:10px;}

  /* REGISTER wrapper */
  #screen-register .scroll{padding-top:24px;}
  #screen-register .hero{text-align:center;margin-bottom:22px;}
  #screen-register .hero h1{font-family:var(--font-display);font-size:24px;margin:0 0 4px;}
  #screen-register .hero p{color:var(--text-dim);font-size:13px;margin:0;}

  /* AVATAR SCREEN */
  #screen-avatar .scroll{align-items:center;text-align:center;display:flex;flex-direction:column;justify-content:center;}
  .avatar-preview{
    width:130px;height:130px;border-radius:50%;background:var(--bg-card);
    border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;
    overflow:hidden;margin:0 auto 20px;font-size:40px;color:var(--text-dim);
  }
  .avatar-preview img{width:100%;height:100%;object-fit:cover;}
  #screen-avatar h2{font-family:var(--font-display);}
  input[type=file]{display:none;}
  .filebtn{
    display:inline-block;padding:10px 20px;border-radius:12px;background:var(--bg-card);
    border:1px solid var(--border);color:var(--accent);font-weight:600;cursor:pointer;margin-bottom:20px;
  }

  /* SETTINGS LIST */
  .settings-item{
    display:flex;align-items:center;gap:14px;padding:15px 6px;border-bottom:1px solid var(--border);
    cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;color:var(--text);font-size:15px;
  }
  .settings-item .ico{
    width:38px;height:38px;border-radius:10px;background:var(--accent-dim);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
  }
  .settings-item .lbl{flex:1;font-weight:600;}
  .settings-item .arrow{color:var(--text-dim);}
  .profile-card{
    display:flex;align-items:center;gap:14px;padding:14px;background:var(--bg-card);
    border-radius:var(--radius);margin-bottom:20px;
  }
  .profile-card .pic{width:56px;height:56px;border-radius:50%;object-fit:cover;background:var(--accent-dim);}
  .profile-card .name{font-weight:700;font-family:var(--font-display);}
  .profile-card .sub{font-size:12px;color:var(--text-dim);}

  /* MODAL / SUBPANEL */
  #modal-overlay{
    position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:50;
  }
  #modal-overlay.active{display:flex;}
  #modal-panel{
    width:100%;max-height:88%;background:var(--bg-alt);border-radius:22px 22px 0 0;
    display:flex;flex-direction:column;animation:slideup .25s ease;
  }
  @keyframes slideup{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  #modal-panel .modal-head{
    display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);
  }
  #modal-panel .modal-head h3{margin:0;font-family:var(--font-display);font-size:17px;}
  #modal-panel .modal-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;}
  #modal-panel .modal-body{padding:18px;overflow-y:auto;}

  .option-row{
    display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);
  }
  .option-row:last-child{border-bottom:none;}
  .switch{position:relative;width:46px;height:26px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:.2s;}
  .slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  input:checked + .slider{background:var(--accent);}
  input:checked + .slider:before{transform:translateX(20px);}

  .swatch-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .swatch{
    flex:1;min-width:90px;padding:14px 8px;border-radius:12px;border:2px solid var(--border);
    text-align:center;cursor:pointer;font-size:13px;font-weight:600;
  }
  .swatch.selected{border-color:var(--accent);color:var(--accent);}
  .kb-preview{
    padding:12px;border-radius:12px;margin-top:6px;font-size:14px;
  }
  .kb-classic{background:var(--bg-card);color:var(--text);font-family:var(--font-body);border:1px solid var(--border);}
  .kb-neon{background:#0d0d17;color:#39ff14;font-family:'Courier New',monospace;border:1px solid #39ff14;box-shadow:0 0 10px #39ff1466;}
  .kb-pastel{background:#ffe8f3;color:#8a4a6b;font-family:var(--font-body);border:1px solid #f3b8d6;}
  .kb-mono{background:#111;color:#eee;font-family:'Courier New',monospace;border:1px solid #444;}

  /* PATTERN LOCK */
  .pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;justify-items:center;margin:26px auto;width:220px;}
  .pattern-dot{
    width:22px;height:22px;border-radius:50%;background:var(--bg-card);border:2px solid var(--border);cursor:pointer;
  }
  .pattern-dot.selected{background:var(--accent);border-color:var(--accent);}

  /* CHATS LIST */
  .chat-row{
    display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid var(--border);cursor:pointer;
  }
  .chat-row .pic{width:48px;height:48px;border-radius:50%;object-fit:cover;background:var(--accent-dim);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;}
  .chat-row .info{flex:1;min-width:0;}
  .chat-row .name{font-weight:700;font-size:15px;}
  .chat-row .last{font-size:13px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-row .time{font-size:11px;color:var(--text-dim);}
  .empty-state{text-align:center;color:var(--text-dim);padding:60px 20px;font-size:14px;}

  /* CHAT WINDOW */
  #screen-chat .topbar{gap:10px;}
  #screen-chat .who{display:flex;align-items:center;gap:10px;flex:1;}
  #screen-chat .who .pic{width:38px;height:38px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;}
  .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
  .bubble{
    max-width:75%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.4;
  }
  .bubble.me{align-self:flex-end;background:var(--bubble-me);border-bottom-right-radius:4px;}
  .bubble.them{align-self:flex-start;background:var(--bubble-them);border-bottom-left-radius:4px;}
  .bubble .t{font-size:10px;color:var(--text-dim);margin-top:4px;text-align:right;}
  .composer{display:flex;gap:10px;padding:12px;border-top:1px solid var(--border);background:var(--bg-alt);}
  .composer input{flex:1;border-radius:20px;}
  .sendbtn{
    width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:#03211d;
    font-weight:700;cursor:pointer;flex-shrink:0;
  }

  /* BOTTOM NAV */
  .bottomnav{
    display:flex;border-top:1px solid var(--border);background:var(--bg-alt);
  }
  .bottomnav button{
    flex:1;background:none;border:none;padding:12px 0 10px;color:var(--text-dim);font-size:11px;font-weight:600;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .bottomnav button.active{color:var(--accent);}
  .bottomnav .ic{font-size:19px;}

  .toast{
    position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--bg-card);border:1px solid var(--border);padding:10px 18px;border-radius:12px;
    font-size:13px;z-index:80;opacity:0;pointer-events:none;transition:opacity .25s;
  }
  .toast.show{opacity:1;}
  .shake{animation:shake .3s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    75%{transform:translateX(8px);}
  }
</style>
</head>
<body>
<div id="phone">

  <!-- SPLASH -->
  <div class="screen active" id="screen-splash">
    <div class="logo">Wi</div>
    <div class="sub">WiChat</div>
    <h1>Thanks for installing WiChat</h1>
  </div>

  <!-- REGISTER -->
  <div class="screen" id="screen-register">
    <div class="scroll">
      <div class="hero">
        <h1>Create your account</h1>
        <p>Your details are stored on this device</p>
      </div>
      <div class="field">
        <label>Email address</label>
        <input type="email" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pwd-wrap">
          <input type="password" id="reg-password" placeholder="Create a password">
          <button type="button" class="pwd-toggle" onclick="togglePwd('reg-password',this)">SHOW</button>
        </div>
      </div>
      <div class="field">
        <label>Date of birth</label>
        <input type="date" id="reg-dob">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="e.g. willywars">
      </div>
      <div class="errormsg" id="reg-error"></div>
      <button class="btn" onclick="submitRegistration()">Enter</button>
    </div>
  </div>

  <!-- AVATAR -->
  <div class="screen" id="screen-avatar">
    <div class="topbar"><h2>Add a profile picture</h2></div>
    <div class="scroll">
      <div class="avatar-preview" id="avatar-preview">📷</div>
      <label class="filebtn" for="avatar-input">Choose photo</label>
      <input type="file" accept="image/*" id="avatar-input" onchange="handleAvatarUpload(event)">
      <button class="btn" style="margin-top:10px;" onclick="finishAvatarStep()">Continue</button>
      <div class="hint" onclick="finishAvatarStep()" style="cursor:pointer;text-decoration:underline;">Skip for now</div>
    </div>
  </div>

  <!-- LOCK SCREEN -->
  <div class="screen" id="screen-lock">
    <div class="scroll" style="justify-content:center;display:flex;flex-direction:column;text-align:center;">
      <h2 style="font-family:var(--font-display);">Enter your <span id="lock-type-label">password</span></h2>
      <div id="lock-password-area">
        <div class="pwd-wrap" style="margin-bottom:14px;">
          <input type="password" id="lock-password-input" placeholder="Password">
          <button type="button" class="pwd-toggle" onclick="togglePwd('lock-password-input',this)">SHOW</button>
        </div>
        <button class="btn" onclick="checkPasswordLock()">Unlock</button>
      </div>
      <div id="lock-pattern-area" style="display:none;">
        <div class="pattern-grid" id="lock-pattern-grid"></div>
        <div class="hint">Tap dots in your pattern order</div>
      </div>
      <div class="errormsg" id="lock-error" style="margin-top:14px;"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="screen" id="screen-app">
    <!-- CHATS VIEW -->
    <div id="view-chats" style="display:flex;flex-direction:column;flex:1;min-height:0;">
      <div class="topbar"><h2>Chats</h2></div>
      <div class="scroll" id="chats-list"></div>
    </div>
    <!-- SETTINGS VIEW -->
    <div id="view-settings" style="display:none;flex-direction:column;flex:1;min-height:0;">
      <div class="topbar"><h2>Settings</h2></div>
      <div class="scroll">
        <div class="profile-card">
          <img class="pic" id="settings-avatar" src="">
          <div>
            <div class="name" id="settings-username">username</div>
            <div class="sub" id="settings-email">email@example.com</div>
          </div>
        </div>
        <button class="settings-item" onclick="openModal('display')"><span class="ico">🎨</span><span class="lbl">Display</span><span class="arrow">›</span></button>
        <button class="settings-item" onclick="openModal('privacy')"><span class="ico">🔒</span><span class="lbl">Privacy</span><span class="arrow">›</span></button>
        <button class="settings-item" onclick="openModal('editprofile')"><span class="ico">👤</span><span class="lbl">Edit profile</span><span class="arrow">›</span></button>
        <button class="settings-item" onclick="openModal('notifications')"><span class="ico">🔔</span><span class="lbl">Notifications</span><span class="arrow">›</span></button>
        <button class="settings-item" onclick="openModal('voiceassistant')"><span class="ico">🎙️</span><span class="lbl">Voice assistant</span><span class="arrow">›</span></button>
        <button class="settings-item" onclick="openModal('language')"><span class="ico">🌐</span><span class="lbl">Language</span><span class="arrow">›</span></button>
        <button class="settings-item" onclick="openModal('addfriends')"><span class="ico">➕</span><span class="lbl">Add friends</span><span class="arrow">›</span></button>
      </div>
    </div>
    <div class="bottomnav">
      <button id="nav-chats" class="active" onclick="switchTab('chats')"><span class="ic">💬</span>Chats</button>
      <button id="nav-settings" onclick="switchTab('settings')"><span class="ic">⚙️</span>Settings</button>
    </div>
  </div>

  <!-- CHAT WINDOW -->
  <div class="screen" id="screen-chat">
    <div class="topbar">
      <button class="backbtn" onclick="showApp('chats')">‹</button>
      <div class="who">
        <div class="pic" id="chat-with-initial">?</div>
        <h2 id="chat-with-name">Friend</h2>
      </div>
    </div>
    <div class="messages" id="chat-messages"></div>
    <div class="composer">
      <input type="text" id="chat-input" placeholder="Message">
      <button class="sendbtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="modal-overlay">
    <div id="modal-panel">
      <div class="modal-head">
        <h3 id="modal-title">Title</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
/* ---------- STORAGE HELPERS ---------- */
async function storageGet(key, fallback){
  try{
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){ return fallback; }
}
async function storageSet(key, value){
  try{ await window.storage.set(key, JSON.stringify(value)); }catch(e){ console.error('storage set failed',e); }
}
function sleep(ms){ return new Promise(res=>setTimeout(res,ms)); }

/* ---------- STATE ---------- */
let profile = { email:'', password:'', dob:'', username:'', pic:'', bio:'' };
let settings = { theme:'dark', keyboard:'classic', notifyVoice:false, voiceAssistant:false, language:'en', lockType:'none', lockValue:'' };
let friends = [];       // array of usernames
let chats = {};         // { username: [ {from:'me'|'them', text, time} ] }
let currentChatUser = null;
let pendingPattern = [];
let patternStage = 'set'; // 'set' | 'confirm'
let firstPattern = '';

const STR = {
  en:{ chats:'Chats', settings:'Settings', display:'Display', privacy:'Privacy', editprofile:'Edit profile', notifications:'Notifications', voiceassistant:'Voice assistant', language:'Language', addfriends:'Add friends' },
  fr:{ chats:'Discussions', settings:'Paramètres', display:'Affichage', privacy:'Confidentialité', editprofile:'Modifier le profil', notifications:'Notifications', voiceassistant:'Assistant vocal', language:'Langue', addfriends:'Ajouter des amis' }
};

/* ---------- UTIL ---------- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function togglePwd(id, btn){
  const inp = document.getElementById(id);
  if(inp.type === 'password'){ inp.type='text'; btn.textContent='HIDE'; }
  else { inp.type='password'; btn.textContent='SHOW'; }
}
function speak(text){
  try{
    const u = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(u);
  }catch(e){}
}
function applyTheme(){
  document.body.classList.toggle('light', settings.theme === 'light');
}
function initials(name){
  return (name||'?').slice(0,2).toUpperCase();
}

/* ---------- BOOT ---------- */
async function boot(){
  showScreen('screen-splash');
  const [onboarded] = await Promise.all([
    storageGet('wichat-onboarded', false),
    sleep(3000)
  ]);
  settings = await storageGet('wichat-settings', settings);
  applyTheme();

  if(!onboarded){
    showScreen('screen-register');
    return;
  }
  profile = await storageGet('wichat-profile', profile);
  friends = await storageGet('wichat-friends', []);
  chats = await storageGet('wichat-chats', {});

  if(settings.lockType && settings.lockType !== 'none'){
    showLockScreen();
  }else{
    enterMainApp();
  }
}

/* ---------- REGISTRATION ---------- */
async function submitRegistration(){
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const dob = document.getElementById('reg-dob').value;
  const username = document.getElementById('reg-username').value.trim();
  const err = document.getElementById('reg-error');

  if(!email || !password || !dob || !username){
    err.textContent = 'Please fill in every field before continuing.';
    return;
  }
  if(!email.includes('@')){
    err.textContent = 'Enter a valid email address.';
    return;
  }
  err.textContent = '';

  profile = { email, password, dob, username, pic:'', bio:'' };
  await storageSet('wichat-profile', profile);
  await storageSet('wichat-onboarded', true);
  showScreen('screen-avatar');
}

/* ---------- AVATAR ---------- */
function handleAvatarUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(ev){
    profile.pic = ev.target.result;
    document.getElementById('avatar-preview').innerHTML = '<img src="'+ev.target.result+'">';
    await storageSet('wichat-profile', profile);
  };
  reader.readAsDataURL(file);
}
async function finishAvatarStep(){
  await storageSet('wichat-profile', profile);
  friends = [];
  chats = {};
  await storageSet('wichat-friends', friends);
  await storageSet('wichat-chats', chats);
  enterMainApp();
}

/* ---------- LOCK SCREEN ---------- */
function showLockScreen(){
  showScreen('screen-lock');
  document.getElementById('lock-error').textContent = '';
  document.getElementById('lock-password-input').value = '';
  if(settings.lockType === 'password'){
    document.getElementById('lock-type-label').textContent = 'password';
    document.getElementById('lock-password-area').style.display = 'block';
    document.getElementById('lock-pattern-area').style.display = 'none';
  }else{
    document.getElementById('lock-type-label').textContent = 'pattern';
    document.getElementById('lock-password-area').style.display = 'none';
    document.getElementById('lock-pattern-area').style.display = 'block';
    renderPatternGrid('lock-pattern-grid', handleLockPatternTap);
  }
}
function checkPasswordLock(){
  const val = document.getElementById('lock-password-input').value;
  if(val === settings.lockValue){
    enterMainApp();
  }else{
    const box = document.getElementById('screen-lock');
    box.classList.add('shake');
    setTimeout(()=>box.classList.remove('shake'),300);
    document.getElementById('lock-error').textContent = 'Incorrect password. Try again.';
  }
}
let lockPatternTaps = [];
function renderPatternGrid(containerId, onComplete){
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  lockPatternTaps = [];
  for(let i=1;i<=9;i++){
    const dot = document.createElement('div');
    dot.className = 'pattern-dot';
    dot.dataset.n = i;
    dot.onclick = function(){
      dot.classList.add('selected');
      lockPatternTaps.push(i);
      if(lockPatternTaps.length >= 4){
        onComplete(lockPatternTaps.join('-'), containerId);
      }
    };
    grid.appendChild(dot);
  }
}
function handleLockPatternTap(patternStr, containerId){
  setTimeout(()=>{
    if(patternStr === settings.lockValue){
      enterMainApp();
    }else{
      const box = document.getElementById('screen-lock');
      box.classList.add('shake');
      setTimeout(()=>box.classList.remove('shake'),300);
      document.getElementById('lock-error').textContent = 'Incorrect pattern. Try again.';
      renderPatternGrid(containerId, handleLockPatternTap);
    }
  }, 150);
}

/* ---------- MAIN APP ENTRY ---------- */
const AI_NAME = 'Trace';
async function ensureAIFriend(){
  if(!friends.includes(AI_NAME)){
    friends.unshift(AI_NAME);
    chats[AI_NAME] = chats[AI_NAME] || [{from:'them', text:"Hey "+(profile.username||'there')+"! I'm Trace, your WiChat AI assistant. Ask me anything.", time: nowTime()}];
    await storageSet('wichat-friends', friends);
    await storageSet('wichat-chats', chats);
  }
}
function enterMainApp(){
  showScreen('screen-app');
  document.getElementById('settings-username').textContent = profile.username || 'username';
  document.getElementById('settings-email').textContent = profile.email || '';
  document.getElementById('settings-avatar').src = profile.pic || avatarPlaceholder();
  ensureAIFriend().then(renderChatsList);
  switchTab('chats');
  if(settings.voiceAssistant) speak('Welcome back to WiChat');
  maybeStartAutoMessages();
}
function avatarPlaceholder(){
  return 'data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="#1f2a2c"/></svg>');
}

/* ---------- TABS ---------- */
function switchTab(tab){
  document.getElementById('view-chats').style.display = tab==='chats' ? 'flex' : 'none';
  document.getElementById('view-settings').style.display = tab==='settings' ? 'flex' : 'none';
  document.getElementById('nav-chats').classList.toggle('active', tab==='chats');
  document.getElementById('nav-settings').classList.toggle('active', tab==='settings');
  if(settings.voiceAssistant) speak('Opening '+tab);
}
function showApp(tab){
  showScreen('screen-app');
  switchTab(tab);
}

/* ---------- CHATS LIST ---------- */
function renderChatsList(){
  const list = document.getElementById('chats-list');
  list.innerHTML = '';
  if(friends.length === 0){
    list.innerHTML = '<div class="empty-state">No chats yet.<br>Go to Settings → Add friends to start one.</div>';
    return;
  }
  friends.forEach(function(name){
    const isAI = name === AI_NAME;
    const msgs = chats[name] || [];
    const last = msgs.length ? msgs[msgs.length-1] : null;
    const row = document.createElement('div');
    row.className = 'chat-row';
    row.onclick = function(){ openChat(name); };
    row.innerHTML =
      '<div class="pic" style="'+(isAI?'background:var(--accent);color:#03211d;':'')+'">'+(isAI?'🤖':initials(name))+'</div>'+
      '<div class="info">'+
        '<div class="name">'+name+(isAI?' <span style="font-size:11px;color:var(--accent);font-weight:600;">· assistant</span>':'')+'</div>'+
        '<div class="last">'+(last ? last.text : 'Say hello 👋')+'</div>'+
      '</div>'+
      '<div class="time">'+(last ? last.time : '')+'</div>';
    list.appendChild(row);
  });
}

/* ---------- CHAT WINDOW ---------- */
function openChat(name){
  currentChatUser = name;
  document.getElementById('chat-with-name').textContent = name;
  const initialEl = document.getElementById('chat-with-initial');
  initialEl.textContent = name === AI_NAME ? '🤖' : initials(name);
  initialEl.style.background = name === AI_NAME ? 'var(--accent)' : '';
  initialEl.style.color = name === AI_NAME ? '#03211d' : '';
  renderMessages();
  applyKeyboardTheme();
  showScreen('screen-chat');
}
function renderMessages(){
  const box = document.getElementById('chat-messages');
  box.innerHTML = '';
  const msgs = chats[currentChatUser] || [];
  msgs.forEach(function(m){
    const b = document.createElement('div');
    b.className = 'bubble ' + (m.from==='me' ? 'me' : 'them');
    b.innerHTML = escapeHtml(m.text) + '<div class="t">'+m.time+'</div>';
    box.appendChild(b);
  });
  box.scrollTop = box.scrollHeight;
}
function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function nowTime(){
  const d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
async function sendMessage(){
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text || !currentChatUser) return;
  const chattingWith = currentChatUser;
  if(!chats[chattingWith]) chats[chattingWith] = [];
  chats[chattingWith].push({from:'me', text, time: nowTime()});
  inp.value = '';
  renderMessages();
  await storageSet('wichat-chats', chats);
  renderChatsList();

  if(chattingWith === AI_NAME){
    await getAIReply(chattingWith);
    return;
  }

  // simple simulated reply so the chat feels alive
  setTimeout(async function(){
    const replies = ['Haha nice one!','I see you 👀','Tell me more.','Arsenal till I die 🔴⚪','On it, give me a sec.'];
    const reply = replies[Math.floor(Math.random()*replies.length)];
    chats[chattingWith].push({from:'them', text:reply, time: nowTime()});
    await storageSet('wichat-chats', chats);
    if(currentChatUser === chattingWith){
      renderMessages();
    }
    renderChatsList();
    if(settings.notifyVoice){
      speak('You have one new message');
    }
  }, 1200 + Math.random()*1000);
}

/* ---------- AI ASSISTANT ---------- */
function showTypingIndicator(){
  const box = document.getElementById('chat-messages');
  if(!box || document.getElementById('typing-bubble')) return;
  const b = document.createElement('div');
  b.className = 'bubble them';
  b.id = 'typing-bubble';
  b.textContent = 'typing…';
  box.appendChild(b);
  box.scrollTop = box.scrollHeight;
}
function hideTypingIndicator(){
  const el = document.getElementById('typing-bubble');
  if(el) el.remove();
}
async function getAIReply(chattingWith){
  if(currentChatUser === chattingWith) showTypingIndicator();

  let history = (chats[chattingWith] || [])
    .filter(m => m.text !== 'typing…')
    .map(m => ({ role: m.from === 'me' ? 'user' : 'assistant', content: m.text }));

  // The API requires the conversation to start on a 'user' turn — drop Trace's
  // seeded greeting (and anything else) before the first real user message.
  const firstUserIdx = history.findIndex(m => m.role === 'user');
  history = firstUserIdx === -1 ? [] : history.slice(firstUserIdx);

  // The API also requires strictly alternating roles — merge any back-to-back
  // messages from the same role (can happen if the user sends twice quickly).
  const merged = [];
  for(const m of history){
    if(merged.length && merged[merged.length-1].role === m.role){
      merged[merged.length-1].content += '\n' + m.content;
    }else{
      merged.push({ role: m.role, content: m.content });
    }
  }
  history = merged;

  let replyText;
  try{
    if(history.length === 0){
      throw new Error('No message to send.');
    }
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: 'You are Trace, the AI assistant built into a WhatsApp-style chat app called WiChat, chatting with a user named '+(profile.username||'a user')+'. Reply like a friendly, natural chat message: warm, concise, no long essays unless asked, no markdown headers.',
        messages: history
      })
    });

    let data;
    const raw = await response.text();
    try{ data = JSON.parse(raw); }catch(parseErr){
      console.error('Trace: response was not valid JSON', raw);
      throw new Error('Got an unexpected response from the server.');
    }

    if(!response.ok){
      console.error('Trace: API returned an error', response.status, data);
      const apiMsg = (data && data.error && data.error.message) ? data.error.message : ('HTTP '+response.status);
      throw new Error(apiMsg);
    }

    replyText = (data.content || [])
      .filter(function(block){ return block.type === 'text'; })
      .map(function(block){ return block.text; })
      .join('\n')
      .trim();

    if(!replyText) replyText = "I didn't quite catch that — mind rephrasing?";
  }catch(e){
    console.error('Trace: request failed', e);
    replyText = "I couldn't reach the AI service just now (" + e.message + "). This usually means the page isn't running inside Claude's preview, since that's what gives it access to the AI. Try opening WiChat directly from the Claude conversation rather than a downloaded copy.";
  }

  hideTypingIndicator();
  chats[chattingWith].push({from:'them', text: replyText, time: nowTime()});
  await storageSet('wichat-chats', chats);
  if(currentChatUser === chattingWith){
    renderMessages();
  }
  renderChatsList();
  if(settings.notifyVoice){
    speak('You have one new message');
  }
}
document.addEventListener('keypress', function(e){
  if(e.target && e.target.id === 'chat-input' && e.key === 'Enter'){
    sendMessage();
  }
});

/* auto-simulated incoming messages, mainly to demo the notification voice */
let autoTimer = null;
function maybeStartAutoMessages(){
  if(autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(async function(){
    if(!settings.notifyVoice || friends.length===0) return;
    const name = friends[Math.floor(Math.random()*friends.length)];
    if(!chats[name]) chats[name] = [];
    const lines = ['Hey, you there?','Did you watch the match?','WiChat is pretty cool right?','Ping!'];
    chats[name].push({from:'them', text: lines[Math.floor(Math.random()*lines.length)], time: nowTime()});
    await storageSet('wichat-chats', chats);
    renderChatsList();
    if(currentChatUser === name && document.getElementById('screen-chat').classList.contains('active')){
      renderMessages();
    }
    speak('You have one new message');
  }, 45000);
}

/* ---------- MODALS ---------- */
function openModal(kind){
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  const title = document.getElementById('modal-title');
  overlay.classList.add('active');

  if(kind === 'display'){
    title.textContent = 'Display';
    body.innerHTML =
      '<label>Theme</label>'+
      '<div class="swatch-row">'+
        '<div class="swatch '+(settings.theme==='dark'?'selected':'')+'" onclick="setTheme(\'dark\')">Dark</div>'+
        '<div class="swatch '+(settings.theme==='light'?'selected':'')+'" onclick="setTheme(\'light\')">Light</div>'+
      '</div>'+
      '<label>Keyboard style</label>'+
      '<div class="swatch-row">'+
        '<div class="swatch '+(settings.keyboard==='classic'?'selected':'')+'" onclick="setKeyboard(\'classic\')">Classic</div>'+
        '<div class="swatch '+(settings.keyboard==='neon'?'selected':'')+'" onclick="setKeyboard(\'neon\')">Neon</div>'+
        '<div class="swatch '+(settings.keyboard==='pastel'?'selected':'')+'" onclick="setKeyboard(\'pastel\')">Pastel</div>'+
        '<div class="swatch '+(settings.keyboard==='mono'?'selected':'')+'" onclick="setKeyboard(\'mono\')">Mono</div>'+
      '</div>'+
      '<div class="kb-preview kb-'+settings.keyboard+'" id="kb-preview-box">Type a message…</div>';
  }

  if(kind === 'privacy'){
    title.textContent = 'Privacy';
    body.innerHTML =
      '<label>App lock</label>'+
      '<div class="swatch-row">'+
        '<div class="swatch '+(settings.lockType==='none'?'selected':'')+'" onclick="chooseLockType(\'none\')">None</div>'+
        '<div class="swatch '+(settings.lockType==='password'?'selected':'')+'" onclick="chooseLockType(\'password\')">Password</div>'+
        '<div class="swatch '+(settings.lockType==='pattern'?'selected':'')+'" onclick="chooseLockType(\'pattern\')">Pattern</div>'+
      '</div>'+
      '<div id="lock-setup-area"></div>';
  }

  if(kind === 'editprofile'){
    title.textContent = 'Edit profile';
    body.innerHTML =
      '<div style="text-align:center;margin-bottom:16px;">'+
        '<div class="avatar-preview" id="edit-avatar-preview" style="width:100px;height:100px;">'+
          (profile.pic ? '<img src="'+profile.pic+'">' : '📷')+
        '</div>'+
        '<label class="filebtn" for="edit-avatar-input">Change photo</label>'+
        '<input type="file" accept="image/*" id="edit-avatar-input" onchange="handleEditAvatar(event)">'+
      '</div>'+
      '<div class="field"><label>Username</label><input type="text" id="edit-username" value="'+escAttr(profile.username)+'"></div>'+
      '<div class="field"><label>Date of birth</label><input type="date" id="edit-dob" value="'+escAttr(profile.dob)+'"></div>'+
      '<div class="field"><label>Bio</label><textarea id="edit-bio" rows="3">'+escapeHtml(profile.bio||'')+'</textarea></div>'+
      '<button class="btn" onclick="saveProfileEdits()">Save changes</button>';
  }

  if(kind === 'notifications'){
    title.textContent = 'Notifications';
    body.innerHTML =
      '<div class="option-row">'+
        '<div><div style="font-weight:600;">Notify me</div><div style="font-size:12px;color:var(--text-dim);">Says "You have one new message" out loud when a message arrives</div></div>'+
        '<label class="switch"><input type="checkbox" id="toggle-notify" '+(settings.notifyVoice?'checked':'')+' onchange="toggleNotify(this.checked)"><span class="slider"></span></label>'+
      '</div>';
  }

  if(kind === 'voiceassistant'){
    title.textContent = 'Voice assistant';
    body.innerHTML =
      '<div class="option-row">'+
        '<div><div style="font-weight:600;">Voice guidance</div><div style="font-size:12px;color:var(--text-dim);">WiChat announces screens as you navigate</div></div>'+
        '<label class="switch"><input type="checkbox" id="toggle-va" '+(settings.voiceAssistant?'checked':'')+' onchange="toggleVoiceAssistant(this.checked)"><span class="slider"></span></label>'+
      '</div>';
  }

  if(kind === 'language'){
    title.textContent = 'Language';
    body.innerHTML =
      '<div class="swatch-row">'+
        '<div class="swatch '+(settings.language==='en'?'selected':'')+'" onclick="setLanguage(\'en\')">English</div>'+
        '<div class="swatch '+(settings.language==='fr'?'selected':'')+'" onclick="setLanguage(\'fr\')">Français</div>'+
      '</div>';
  }

  if(kind === 'addfriends'){
    title.textContent = 'Add friends';
    body.innerHTML =
      '<div class="field"><label>Username</label><input type="text" id="friend-username" placeholder="Enter their WiChat username"></div>'+
      '<button class="btn" onclick="addFriend()">Add to chats</button>'+
      '<div class="hint">Current friends: '+(friends.length ? friends.join(', ') : 'none yet')+'</div>';
  }

  if(settings.voiceAssistant) speak('Opening '+kind);
}
function escAttr(s){ return (s||'').replace(/"/g,'&quot;'); }
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('active');
}

/* ---- Display actions ---- */
async function setTheme(t){
  settings.theme = t;
  applyTheme();
  await storageSet('wichat-settings', settings);
  openModal('display');
}
async function setKeyboard(k){
  settings.keyboard = k;
  await storageSet('wichat-settings', settings);
  applyKeyboardTheme();
  openModal('display');
}
function applyKeyboardTheme(){
  const inp = document.getElementById('chat-input');
  if(!inp) return;
  inp.className = 'kb-'+settings.keyboard;
}

/* ---- Privacy actions ---- */
function chooseLockType(type){
  settings.lockType = type;
  const area = document.getElementById('lock-setup-area');
  if(type === 'none'){
    settings.lockValue = '';
    storageSet('wichat-settings', settings);
    area.innerHTML = '<div class="hint">App lock disabled.</div>';
    openModal('privacy');
    return;
  }
  if(type === 'password'){
    area.innerHTML =
      '<div class="field" style="margin-top:14px;"><label>Set a password</label>'+
      '<div class="pwd-wrap"><input type="password" id="new-lock-password" placeholder="New password">'+
      '<button type="button" class="pwd-toggle" onclick="togglePwd(\'new-lock-password\',this)">SHOW</button></div></div>'+
      '<button class="btn" onclick="saveLockPassword()">Save password lock</button>';
  }
  if(type === 'pattern'){
    firstPattern = '';
    patternStage = 'set';
    area.innerHTML =
      '<div class="hint" id="pattern-instruction" style="margin-top:10px;">Draw a new pattern (at least 4 dots)</div>'+
      '<div class="pattern-grid" id="setup-pattern-grid"></div>';
    renderPatternGrid('setup-pattern-grid', handleSetupPatternTap);
  }
}
async function saveLockPassword(){
  const val = document.getElementById('new-lock-password').value;
  if(!val){ showToast('Enter a password first'); return; }
  settings.lockType = 'password';
  settings.lockValue = val;
  await storageSet('wichat-settings', settings);
  showToast('Password lock saved');
  openModal('privacy');
}
function handleSetupPatternTap(patternStr, containerId){
  setTimeout(async ()=>{
    if(patternStage === 'set'){
      firstPattern = patternStr;
      patternStage = 'confirm';
      document.getElementById('pattern-instruction').textContent = 'Repeat the pattern to confirm';
      renderPatternGrid(containerId, handleSetupPatternTap);
    }else{
      if(patternStr === firstPattern){
        settings.lockType = 'pattern';
        settings.lockValue = patternStr;
        await storageSet('wichat-settings', settings);
        showToast('Pattern lock saved');
        openModal('privacy');
      }else{
        document.getElementById('pattern-instruction').textContent = "Patterns didn't match. Draw a new pattern";
        patternStage = 'set';
        renderPatternGrid(containerId, handleSetupPatternTap);
      }
    }
  }, 150);
}

/* ---- Edit profile actions ---- */
function handleEditAvatar(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    profile.pic = ev.target.result;
    document.getElementById('edit-avatar-preview').innerHTML = '<img src="'+ev.target.result+'">';
  };
  reader.readAsDataURL(file);
}
async function saveProfileEdits(){
  profile.username = document.getElementById('edit-username').value.trim() || profile.username;
  profile.dob = document.getElementById('edit-dob').value;
  profile.bio = document.getElementById('edit-bio').value;
  await storageSet('wichat-profile', profile);
  document.getElementById('settings-username').textContent = profile.username;
  document.getElementById('settings-avatar').src = profile.pic || avatarPlaceholder();
  showToast('Profile updated');
  closeModal();
}

/* ---- Notifications / voice assistant ---- */
async function toggleNotify(val){
  settings.notifyVoice = val;
  await storageSet('wichat-settings', settings);
  if(val) speak('Notifications turned on. I will tell you when you have one new message.');
}
async function toggleVoiceAssistant(val){
  settings.voiceAssistant = val;
  await storageSet('wichat-settings', settings);
  if(val) speak('Voice assistant turned on');
}

/* ---- Language ---- */
async function setLanguage(lang){
  settings.language = lang;
  await storageSet('wichat-settings', settings);
  applyLanguage();
  openModal('language');
}
function applyLanguage(){
  const s = STR[settings.language] || STR.en;
  document.getElementById('nav-chats').lastChild ? null : null;
  document.querySelector('#nav-chats').childNodes[1].nodeValue = s.chats;
  document.querySelector('#nav-settings').childNodes[1].nodeValue = s.settings;
}

/* ---- Add friends ---- */
async function addFriend(){
  const inp = document.getElementById('friend-username');
  const name = inp.value.trim();
  if(!name){ showToast('Enter a username'); return; }
  if(name === profile.username){ showToast("That's your own username"); return; }
  if(friends.includes(name)){ showToast(name+' is already in your chats'); openModal('addfriends'); return; }
  friends.push(name);
  chats[name] = chats[name] || [];
  await storageSet('wichat-friends', friends);
  await storageSet('wichat-chats', chats);
  renderChatsList();
  showToast(name+' added to your chats');
  openModal('addfriends');
}

boot();
